name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag for manual release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag }}' already exists."
          else
            git tag "${{ github.event.inputs.tag }}" "${GITHUB_SHA}"
            git push origin "refs/tags/${{ github.event.inputs.tag }}"
          fi

      - name: Resolve release version
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate VERSION file
        run: |
          FILE_VERSION="$(tr -d '\n' < VERSION)"
          if [ "$FILE_VERSION" != "${{ steps.resolve.outputs.version }}" ]; then
            echo "VERSION file ($FILE_VERSION) does not match release tag (${{ steps.resolve.outputs.version }})." >&2
            exit 1
          fi

  build:
    needs: prepare-release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libglx-dev \
            libglvnd-dev \
            desktop-file-utils \
            squashfs-tools

      - name: Download linuxdeploy
        run: |
          mkdir -p .tools

          curl -L \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o .tools/linuxdeploy-x86_64.AppImage

          curl -L \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage \
            -o .tools/linuxdeploy-plugin-appimage-x86_64.AppImage

          chmod +x \
            .tools/linuxdeploy-x86_64.AppImage \
            .tools/linuxdeploy-plugin-appimage-x86_64.AppImage

          ln -sf linuxdeploy-x86_64.AppImage .tools/linuxdeploy
          ln -sf linuxdeploy-plugin-appimage-x86_64.AppImage .tools/linuxdeploy-plugin-appimage
          echo "$PWD/.tools" >> "$GITHUB_PATH"

      - name: Build AppImage
        env:
          ARCH: x86_64
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          scripts/build-appimage.sh

      - name: Package release assets
        run: |
          mkdir -p release
          cp dist/*.AppImage release/
          (cd release && sha256sum *.AppImage > SHA256SUMS)

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-appimage
          path: release/*

  create-release:
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release/*.AppImage
            release/SHA256SUMS
          body: |
            ## coomer v${{ needs.prepare-release.outputs.version }}

            Zoomer application for everyone on Linux.

            ### Assets

            - `coomer-v${{ needs.prepare-release.outputs.version }}-linux-x86_64.AppImage`

            ### Installation

            Download the AppImage, mark it executable, and run it:

            ```bash
            chmod +x coomer-v${{ needs.prepare-release.outputs.version }}-linux-x86_64.AppImage
            ./coomer-v${{ needs.prepare-release.outputs.version }}-linux-x86_64.AppImage
            ```

            On NixOS, run it with `appimage-run`.

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
